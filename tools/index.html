<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux · Staff Access</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #004a79;
    --salmon:     #ea9d87;
    --light-blue: #c0dcf5;
    --blush:      #fbdcd2;
    --green:      #006b5b;
    --sand:       #f5ede6;
    --text:       #1a2331;
    --muted:      #8a9aab;
    --border:     rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* ─── BACKGROUND LAYERS ─── */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(192,220,245,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(192,220,245,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .bg-glow-hot {
    background: radial-gradient(circle, rgba(234,157,135,0.18) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    animation-delay: 0s;
  }
  .bg-glow-cold {
    background: radial-gradient(circle, rgba(192,220,245,0.14) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    animation-delay: -6s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, -20px) scale(1.08); }
  }
  /* ─── CARD ─── */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    margin: 1.5rem;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* ─── HEADER BLOCK ─── */
  .card-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .flux-logo {
    width: 180px;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  .wordmark-bar {
    display: block;
    width: 32px;
    height: 2px;
    background: var(--salmon);
    margin: 1rem auto 0.7rem;
    border-radius: 2px;
  }
  .card-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  /* ─── FORM PANEL ─── */
  .form-panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    backdrop-filter: blur(12px);
  }
  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    display: block;
    margin-bottom: 0.55rem;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap svg {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .password-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 0.85rem 1rem 0.85rem 2.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    color: white;
    letter-spacing: 0.15em;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-text-security: disc;
    text-security: disc;
  }
  .password-input[type="password"] {
    letter-spacing: 0.2em;
  }
  .password-input::placeholder {
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
    font-size: 0.85rem;
  }
  .password-input:focus {
    border-color: var(--light-blue);
    background: rgba(255,255,255,0.09);
  }
  .input-wrap:focus-within svg {
    opacity: 0.6;
  }
  /* ─── ERROR STATE ─── */
  .password-input.error {
    border-color: var(--salmon);
    animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }
  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--salmon);
    margin-top: 0.5rem;
    min-height: 1em;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .error-msg.visible { opacity: 1; }
  /* ─── SUBMIT BUTTON ─── */
  .submit-btn {
    width: 100%;
    margin-top: 1.5rem;
    background: white;
    color: var(--navy);
    border: none;
    border-radius: 10px;
    padding: 0.9rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .submit-btn:hover::after { transform: translateX(100%); }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.loading {
    opacity: 0.6;
    pointer-events: none;
  }
  /* ─── FOOTER ─── */
  .card-footer {
    text-align: center;
    margin-top: 1.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.2);
  }
  /* ─── SUCCESS STATE ─── */
  .card.success .form-panel {
    border-color: rgba(192,220,245,0.3);
  }
  .success-msg {
    display: none;
    text-align: center;
    padding: 1rem 0 0.5rem;
    animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .success-msg .check {
    font-size: 1.5rem;
    display: block;
    margin-bottom: 0.5rem;
  }
  .success-msg p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--light-blue);
  }
  /* temperature accent lines — decorative */
  .temp-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .temp-line {
    position: absolute;
    height: 1px;
    opacity: 0.06;
  }
  .temp-line-hot {
    background: linear-gradient(90deg, transparent, var(--salmon), transparent);
    width: 60%;
    top: 35%;
    left: -10%;
    animation: slide-right 8s ease-in-out infinite alternate;
  }
  .temp-line-cold {
    background: linear-gradient(90deg, transparent, var(--light-blue), transparent);
    width: 50%;
    bottom: 40%;
    right: -10%;
    animation: slide-left 10s ease-in-out infinite alternate;
  }
  @keyframes slide-right {
    from { transform: translateX(0); }
    to   { transform: translateX(80px); }
  }
  @keyframes slide-left {
    from { transform: translateX(0); }
    to   { transform: translateX(-60px); }
  }
</style>
</head>

</div>

          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <div class="error-msg" id="error-msg">Incorrect access code — try again</div>
      <button class="submit-btn" id="submit-btn" onclick="submit()">Enter</button>
    </div>
    <div class="success-msg" id="success-msg">
      <span class="check">✓</span>
      <p>Access granted — opening tool</p>
    </div>
  </div>
  <div class="card-footer">
    Flux Thermal Lounge · Bend, OR · Staff Only
  </div>
</div>
<script>
  const ACCESS_CODE = '145145';
  const TOOL_URL = 'log.html';
  function submit() {
    const input = document.getElementById('pw');
    const btn   = document.getElementById('submit-btn');
    const err   = document.getElementById('error-msg');
    btn.classList.add('loading');
    btn.textContent = 'Checking…';
    setTimeout(() => {
      if (input.value === ACCESS_CODE) {
        sessionStorage.setItem('flux-auth', 'ok');
        err.classList.remove('visible');
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('card').classList.add('success');
        setTimeout(() => { window.location.href = TOOL_URL; }, 900);
      } else {
        input.classList.add('error');
        err.classList.add('visible');
        btn.classList.remove('loading');
        btn.textContent = 'Enter';
        input.value = '';
        input.focus();
        setTimeout(() => input.classList.remove('error'), 400);
      }
    }, 300);
  }
</script>
</body>
</html>
